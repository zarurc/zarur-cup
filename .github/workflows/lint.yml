name: Lint & Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jfrog/boost@v0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: FND-03 — no physical-direction Tailwind utilities
        run: npm run lint:rtl
      - name: SCR-05 — no bare [--zc-X] Tailwind v4 shorthand
        run: npm run lint:tailwind-v4
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck
